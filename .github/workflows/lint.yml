name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check app/"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check app/"
